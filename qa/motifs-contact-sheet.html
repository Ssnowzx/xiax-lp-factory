<!doctype html><html><head><meta charset="utf-8"><style>
:root{--base:#14110E;--surface:#1C1815;--accent:#D6A24E;--line:#332C24;--ink:#F3ECE0;--ink-subtle:#9C8F7C}
body{margin:0;background:var(--base);font-family:ui-monospace,monospace;color:var(--ink)}
h1{font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-subtle);padding:24px 24px 8px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);padding:24px}
.cell{background:var(--surface);padding:22px;display:flex;flex-direction:column;align-items:center;gap:14px}
.row{display:flex;gap:22px;align-items:center}
.lg{width:120px;height:120px;color:var(--accent)}
.md{width:40px;height:40px;color:var(--accent)}
.sm{width:22px;height:22px;color:var(--ink-subtle)}
.lg svg,.md svg,.sm svg{width:100%;height:100%;display:block}
.name{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-subtle)}
.demo{grid-column:span 2;background:var(--base);position:relative;height:180px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--line)}
.demo .bg{position:absolute;right:-30px;top:-40px;width:300px;height:300px;color:var(--accent);opacity:.05}
.demo h2{font-size:30px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;margin:0;z-index:1;color:var(--ink);text-align:center;padding:0 16px}
</style></head><body>
